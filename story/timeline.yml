# Timeline (schema: authorbot.timeline/v1).
#
# `sort_key` is the sortable value; `display_time` is the human label. This
# keeps custom calendars and relative time sortable without parsing labels.
#
# This template ships EMPTY. The calendar below is a neutral default: story
# time is measured relative to whatever you decide the beginning is. Change
# `type` to `absolute` for real-world dates, or to a label of your own for a
# custom calendar — nothing parses this value; it tells collaborators and
# agents how to read `display_time`.
#
# Add events as the story takes shape, for example:
#
#   events:
#     - id: event:opening-event
#       sort_key: 100
#       display_time: Day 0
#       title: The story begins
#       participants:
#         - character:protagonist
#       chapter_refs:
#         - <the chapter's UUIDv7, from its frontmatter `id`>
#       facts:
#         - Continuity facts live here as short declarative sentences.
#
# `participants` must name characters that exist in story/characters/, and
# `chapter_refs` must name real chapter IDs — `authorbot validate` checks both.
#
# A filled-in example lives in examples/book-repo/story/timeline.yml.
schema: authorbot.timeline/v1
calendar:
  type: relative
events: []
