# Authorbot publication workflow (design §17.2, ADR-0020, ADR-0021, ADR-0022).
#
# Publishes the book as a static reading site on a Cloudflare Worker whenever
# public content changes on main. It never runs on raw collaboration traffic
# (design §7.4): annotations and votes are validated by validate.yml without
# rebuilding the book.
#
# NO CLONE, NO COMPILE (ADR-0022). This workflow installs the published
# `@authorbot/cli` package and runs its binary. It does not check out the
# Authorbot repository and does not build TypeScript. The version of the
# toolchain that runs is the one written in this repository's package.json and
# locked by package-lock.json — visible in your history, diffable in a pull
# request, and revertable with `git revert` alongside whatever content it was
# paired with. There is no AUTHORBOT_REF repository variable any more.
#
# ONE HOST, BY DESIGN (ADR-0020). GitHub holds the repository; Cloudflare
# serves the site — and, later, the collaboration API from that same origin
# (ADR-0019). There is no GitHub Pages path: a static-only host can serve the
# prose but never the annotations, votes, or work queue, so shipping both
# produced two live URLs where one silently lacked every collaboration
# feature. Cloudflare's free tier covers a book of this size.
#
# One-time setup for your repository:
#   1. Edit wrangler.jsonc: set `name` to the Worker name you want.
#   2. Run `npm install` once locally and COMMIT package-lock.json. `npm ci`
#      below refuses to run without it, and that is deliberate — an install
#      without a lockfile is an unpinned install.
#   3. Create a Cloudflare API token with the "Edit Cloudflare Workers"
#      template and store it as the CLOUDFLARE_API_TOKEN repository *secret*;
#      store your account id as the CLOUDFLARE_ACCOUNT_ID repository secret.
#   4. Only if the book is served under a sub-path of a larger site (e.g.
#      https://example.com/my-book/), set the AUTHORBOT_BASE_URL repository
#      variable to that path or URL. Leave it unset for a book at the root of
#      its own hostname, which is the usual case.

name: publish

on:
  push:
    branches: [main]
    # Path filters per design §7.4: chapters, story data, book.yml, and
    # publisher configuration trigger a public rebuild. Releases are included
    # so a manual release commit republishes; other .authorbot/** records do
    # not trigger publication. wrangler.jsonc is included because it decides
    # what is deployed and where, and package-lock.json because it decides
    # which toolchain builds it.
    paths:
      - "book.yml"
      - "chapters/**"
      - "story/**"
      - ".authorbot/releases/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish.yml"
  # Manual release / redeploy.
  workflow_dispatch: {}

# Deploying needs nothing beyond reading this repository: the Cloudflare
# credentials are repository secrets, not GitHub OIDC scopes.
permissions:
  contents: read

# One deployment at a time; let a queued deploy of a newer commit finish
# rather than cancelling it mid-flight.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the book repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` installs exactly what package-lock.json records, with
      # integrity hashes, and fails rather than silently resolving something
      # newer. The check in front of it turns npm's confusing "can only
      # install with an existing package-lock.json" error into an instruction.
      - name: Install the pinned Authorbot toolchain
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is missing. Run 'npm install' locally and commit the lockfile — it is what pins your toolchain version."
            exit 1
          fi
          npm ci --no-audit --no-fund

      - name: Validate the book repository
        run: npx authorbot validate .

      # --base-url survives ADR-0020 for exactly one job: serving the book
      # under a base path (ADR-0019 §6). A book at the root of its own
      # hostname needs no prefix, so the flag is passed only when
      # AUTHORBOT_BASE_URL is set — an empty --base-url is a usage error, and
      # a wrong one produces a site whose internal links and stylesheet 404.
      - name: Build the static site and build manifest
        env:
          BASE_URL: ${{ vars.AUTHORBOT_BASE_URL }}
        run: |
          if [ -n "$BASE_URL" ]; then
            npx authorbot build . --out _site --base-url "$BASE_URL"
          else
            npx authorbot build . --out _site
          fi

      # ADR-0021 §4 — MIGRATIONS RUN BEFORE THE DEPLOY, NOT AFTER.
      #
      # The Worker currently serving your readers keeps serving throughout the
      # deploy, so for the seconds between these two steps the OLD code is
      # talking to the NEW schema. Migrating first is the only ordering that
      # is safe in that window: a migration can be written to be compatible
      # with the code already running, whereas a Worker cannot be written to
      # tolerate columns that do not exist yet. Deploy-then-migrate leaves a
      # live Worker querying a table it has not got.
      #
      # That safety is conditional on migrations being EXPAND/CONTRACT: only
      # additive changes ship in a release that also changes the Worker.
      # Removing a column or tightening a constraint takes two releases —
      # expand in one, deploy, contract in the next — so no deployed version
      # ever meets a schema it was not written for. Authorbot's own migrations
      # follow this rule; if you write your own, it applies to you too.
      #
      # The SQL comes from node_modules/@authorbot/api/migrations, named as
      # `migrations_dir` in wrangler.jsonc, so the schema and the Worker code
      # are always the same pinned version. Applying is idempotent: wrangler
      # records what it has run in a d1_migrations table and skips it next
      # time. A static-only book has no @authorbot/api package, so the step
      # exits cleanly. Once the API package is pinned, a missing DB binding is
      # an error: silently deploying a Worker ahead of its schema is unsafe.
      # A book's very first push happens before `create-authorbot publish` has
      # had a chance to store the Cloudflare credentials, so this workflow used
      # to fail on every brand-new book: a red cross and a failure email before
      # the author had done anything wrong, about a deploy the wizard was in
      # the middle of doing for them anyway. Validation and the build above are
      # still worth running on that push, so only the two steps that actually
      # talk to Cloudflare are skipped — and they say why rather than being
      # silently absent.
      - name: Check for Cloudflare credentials
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No CLOUDFLARE_API_TOKEN is set yet, so nothing was deployed. Your site goes up when you run the publish stage of create-authorbot, which sets this secret; every push after that deploys from here."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply pending database migrations
        if: ${{ steps.creds.outputs.present == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ ! -d node_modules/@authorbot/api/migrations ]; then
            echo "::notice::No @authorbot/api package is pinned, so this static-only book has no D1 migrations."
            exit 0
          fi
          npx wrangler d1 migrations apply DB --remote

      # Deploys the Worker described by wrangler.jsonc, whose `assets` block
      # points at the _site directory built above. Stage 3 of
      # docs/getting-started.md upgrades that same Worker to also serve the
      # collaboration API from this one origin; this step does not change
      # when that happens.
      - name: Deploy to Cloudflare
        if: ${{ steps.creds.outputs.present == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
